<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Funcional</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
           
            background-color: #f0f0f0;
        }

        .calculator {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            width: 220px;
        }

        #resultado {
            width: 90%;
            padding: 10px;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: right;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #eaeaea;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .buttons button {
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #f5f5f5;
        }

        .buttons button:hover {
            background-color: #ddd;
        }

        .buttons button.operator {
            background-color: #ff9500;
            color: #fff;
        }

        .buttons button.operator:hover {
            background-color: #e08a00;
        }

        .buttons button.clear {
            background-color: #ff3b30;
            color: #fff;
            grid-column: span 4;
        }

        .buttons button.clear:hover {
            background-color: #cc2a25;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="resultado" placeholder="0" readonly>

        <div class="buttons">
            <button onclick="adicionarNumero('7')">7</button>
            <button onclick="adicionarNumero('8')">8</button>
            <button onclick="adicionarNumero('9')">9</button>
            <button class="operator" onclick="operacao('/')">÷</button>

            <button onclick="adicionarNumero('4')">4</button>
            <button onclick="adicionarNumero('5')">5</button>
            <button onclick="adicionarNumero('6')">6</button>
            <button class="operator" onclick="operacao('*')">×</button>

            <button onclick="adicionarNumero('1')">1</button>
            <button onclick="adicionarNumero('2')">2</button>
            <button onclick="adicionarNumero('3')">3</button>
            <button class="operator" onclick="operacao('-')">-</button>

            <button onclick="adicionarNumero('0')">0</button>
            <button onclick="adicionarNumero('.')">.</button>
            <button class="operator" onclick="calcularResultado()">=</button>
            <button class="operator" onclick="operacao('+')">+</button>

            <button class="clear" onclick="limpar()">C</button>
        </div>
    </div>

    <script>
        let valorAtual = '';
        let valorAnterior = '';
        let operador = '';

        function adicionarNumero(num) {
            if (num === '.' && valorAtual.includes('.')) return; // evita múltiplos pontos
            valorAtual += num;
            atualizarDisplay();
        }

        function operacao(op) {
            if (valorAtual === '') return;
            if (valorAnterior !== '') {
                calcularResultado();
            }
            operador = op;
            valorAnterior = valorAtual;
            valorAtual = '';
        }

        function calcularResultado() {
            if (valorAtual === '' || valorAnterior === '') return;
            const a = parseFloat(valorAnterior);
            const b = parseFloat(valorAtual);
            let resultado;

            switch (operador) {
                case '+':
                    resultado = a + b;
                    break;
                case '-':
                    resultado = a - b;
                    break;
                case '*':
                    resultado = a * b;
                    break;
                case '/':
                    if (b === 0) {
                        alert('Divisão por zero não é permitida.');
                        limpar();
                        return;
                    }
                    resultado = a / b;
                    break;
                default:
                    return;
            }

            valorAtual = resultado.toString();
            operador = '';
            valorAnterior = '';
            atualizarDisplay();
        }

        function atualizarDisplay() {
            document.getElementById('resultado').value = valorAtual || '0';
        }

        function limpar() {
            valorAtual = '';
            valorAnterior = '';
            operador = '';
            atualizarDisplay();
        }
    </script>
</body>
</html>
